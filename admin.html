
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHS Courier Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="loginBox">
<h2>Admin Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="container" id="adminPanel" style="display:none;">
<h2>Generate Tracking</h2>

<input type="text" id="sender" placeholder="Sender Name">
<input type="text" id="receiver" placeholder="Receiver Name">
<input type="text" id="origin" placeholder="Origin">
<input type="text" id="destination" placeholder="Destination">
<input type="text" id="status" placeholder="Status">
<button onclick="generate()">Generate Tracking</button>

<div id="generated"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
